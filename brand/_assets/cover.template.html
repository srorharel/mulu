<meta charset="utf-8">
<style>
  @font-face{font-family:Heebo;font-weight:500;font-display:block;src:url(__HEEBO_HE_500__) format('woff2');unicode-range:U+0590-05FF,U+FB1D-FB4F;}
  @font-face{font-family:Heebo;font-weight:500;font-display:block;src:url(__HEEBO_LAT_500__) format('woff2');unicode-range:U+0000-00FF,U+2000-206F,U+20A0-20BF;}
  @font-face{font-family:Heebo;font-weight:700;font-display:block;src:url(__HEEBO_HE_700__) format('woff2');unicode-range:U+0590-05FF,U+FB1D-FB4F;}
  @font-face{font-family:Heebo;font-weight:700;font-display:block;src:url(__HEEBO_LAT_700__) format('woff2');unicode-range:U+0000-00FF,U+2000-206F,U+20A0-20BF;}
  @font-face{font-family:Heebo;font-weight:900;font-display:block;src:url(__HEEBO_HE_900__) format('woff2');unicode-range:U+0590-05FF,U+FB1D-FB4F;}
  @font-face{font-family:Heebo;font-weight:900;font-display:block;src:url(__HEEBO_LAT_900__) format('woff2');unicode-range:U+0000-00FF,U+2000-206F,U+20A0-20BF;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#0c5e33}
  .cover{position:relative;width:1640px;height:624px;overflow:hidden;font-family:Heebo,sans-serif;
    background:radial-gradient(118% 135% at 80% -12%, #46D983 0%, #2BBC69 25%, #1C9A52 50%, #11763F 74%, #0A5830 100%);}
  .mesh{position:absolute;inset:0;
    background:
      radial-gradient(42% 62% at 10% 16%, rgba(255,255,255,.11), transparent 70%),
      radial-gradient(55% 75% at 96% 100%, rgba(7,55,30,.60), transparent 72%);}
  .deco{position:absolute;inset:0}

  /* ---------- left graphic: app tile + shine + pin ---------- */
  .stage{position:absolute;inset:0}
  .glow{position:absolute;left:268px;top:148px;width:368px;height:368px;border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.40) 0%, rgba(255,255,255,.11) 44%, transparent 68%)}
  .tile{position:absolute;left:322px;top:200px;width:264px;height:264px;border-radius:62px;overflow:hidden;
    transform:rotate(-7deg);
    box-shadow:0 40px 72px rgba(5,38,21,.48), 0 10px 22px rgba(5,38,21,.32);
    outline:6px solid rgba(255,255,255,.20);outline-offset:-2px}
  .tile img{width:100%;height:100%;display:block}
  .tile .shine{position:absolute;inset:0;
    background:linear-gradient(116deg, transparent 36%, rgba(255,255,255,.42) 47%, rgba(255,255,255,.10) 55%, transparent 62%)}
  .pin{position:absolute;left:372px;top:430px;display:flex;align-items:center;gap:9px;
    padding:12px 19px 12px 15px;border-radius:999px;
    background:#fff;box-shadow:0 18px 34px rgba(5,38,21,.38);transform:rotate(-4deg)}
  .pin span{font-weight:700;font-size:22px;color:#11763F}

  /* ---------- right content ---------- */
  .content{position:absolute;right:270px;top:50%;transform:translateY(-52%);width:752px;
    display:flex;flex-direction:column;align-items:flex-end;text-align:right;direction:rtl;gap:22px}
  .brandrow{display:flex;align-items:center;gap:13px}
  .wordmark{font-weight:900;font-size:40px;letter-spacing:2px;color:#fff;line-height:1}
  .kicker{display:inline-flex;align-items:center;gap:11px;padding:10px 21px;border-radius:999px;
    background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.34);
    color:#fff;font-weight:700;font-size:24px}
  h1{color:#fff;font-weight:900;font-size:73px;line-height:1.05;letter-spacing:-1px}
  h1 .accent{color:#C8F8DC}
  .sub{color:rgba(255,255,255,.94);font-weight:500;font-size:29px;line-height:1.42;max-width:720px}
  .chips{display:flex;gap:13px;direction:rtl}
  .chip{display:inline-flex;align-items:center;gap:10px;padding:12px 19px;border-radius:15px;
    background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.28);
    color:#fff;font-weight:700;font-size:22px;white-space:nowrap}
  .chip svg{flex:none}
  .foot{display:flex;align-items:center;gap:13px;color:rgba(255,255,255,.84);font-weight:500;font-size:22px;margin-top:2px}
  .foot .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5)}
</style>

<div class="cover">
  <div class="mesh"></div>

  <svg class="deco" viewBox="0 0 1640 624" fill="none" xmlns="http://www.w3.org/2000/svg">
    <g fill="#ffffff">
      <path d="M120 150 l9 25 25 9 -25 9 -9 25 -9-25 -25-9 25-9z" opacity=".8"/>
      <path d="M650 130 l7 18 18 7 -18 7 -7 18 -7-18 -18-7 18-7z" opacity=".62"/>
      <path d="M250 500 l6 16 16 6 -16 6 -6 16 -6-16 -16-6 16-6z" opacity=".55"/>
      <path d="M1500 430 l8 21 21 8 -21 8 -8 21 -8-21 -21-8 21-8z" opacity=".5"/>
      <path d="M1560 150 l6 16 16 6 -16 6 -6 16 -6-16 -16-6 16-6z" opacity=".42"/>
      <path d="M70 380 l5 14 14 5 -14 5 -5 14 -5-14 -14-5 14-5z" opacity=".5"/>
    </g>
    <g fill="#ffffff" opacity=".5">
      <path d="M210 105 c10 14 16 24 16 33 a16 16 0 0 1 -32 0 c0-9 6-19 16-33z"/>
      <path d="M635 250 c7 10 11 17 11 23 a11 11 0 0 1 -22 0 c0-6 4-13 11-23z" opacity=".7"/>
      <path d="M150 300 c6 8 9 14 9 19 a9 9 0 0 1 -18 0 c0-5 3-11 9-19z" opacity=".7"/>
    </g>
  </svg>

  <div class="stage">
    <div class="glow"></div>
    <div class="tile"><img src="__LOGO__" alt="MULU"><div class="shine"></div></div>
    <div class="pin">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M12 21s7-6.3 7-11a7 7 0 1 0-14 0c0 4.7 7 11 7 11z" fill="#26B55F"/><circle cx="12" cy="10" r="2.6" fill="#fff"/></svg>
      <span>באים עד הרכב</span>
    </div>
  </div>

  <div class="content">
    <div class="brandrow">
      <svg width="38" height="38" viewBox="0 0 24 24" fill="#fff"><path d="M12 1.6 l2.4 6.4 6.4 2.4 -6.4 2.4 -2.4 6.4 -2.4-6.4 -6.4-2.4 6.4-2.4z"/></svg>
      <div class="wordmark">MULU</div>
    </div>

    <div class="kicker">באים אליכם, לאן שהרכב חונה</div>

    <h1>הרכב שלכם מבריק שוב.<br><span class="accent">ואתם לא זזים.</span></h1>

    <div class="sub">שוטף מאומת מגיע עד הרכב, בדיוק איפה שהוא חונה. בלי תורים, בלי נסיעות, רק רכב נוצץ.</div>

    <div class="chips">
      <div class="chip">
        <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6l7-3z"/><path d="M9 12l2 2 4-4"/></svg>
        שוטפים מאומתים
      </div>
      <div class="chip">
        <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8a2 2 0 0 1 2-2h2l1.5-2h7L19 6a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><circle cx="12" cy="12.5" r="3.3"/></svg>
        תיעוד בתמונות
      </div>
      <div class="chip">
        <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="10.5" width="14" height="9.5" rx="2.2"/><path d="M8 10.5V8a4 4 0 0 1 8 0v2.5"/></svg>
        תשלום מאובטח
      </div>
    </div>

    <div class="foot">
      <span>muluwash.com</span>
      <span class="dot"></span>
      <span>כרגע פועלים בחולון</span>
    </div>
  </div>
</div>
