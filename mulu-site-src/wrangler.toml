# Cloudflare deploy config for the MULU marketing site.
# Target: the existing assets-only static Worker `spring-dew-1440` (muluwash.com).
# Deploy with:  cd mulu-site-src && npm run build && npx wrangler deploy
# Assets come from dist/ (the clean Vite build — no node_modules/.claude/.wrangler).
# NOTE: no _redirects file — Workers static assets reject it ("infinite loop").
#       SPA fallback is done here instead, matching the current live behavior.
name = "spring-dew-1440"
compatibility_date = "2025-01-01"

[assets]
directory = "dist"
not_found_handling = "single-page-application"
# Serve .html files at their literal path (e.g. the Meta domain-verification file
# /41901…​.html). The default ("auto-trailing-slash") 308-redirects /foo.html → /foo,
# which broke Meta verification ("redirected to another location"). The homepage and
# SPA routes still resolve via the single-page-application not-found fallback above.
html_handling = "none"
