<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>MULU Support — Agent Workspace</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: Inter, system-ui; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Support needs MapBG from brand.jsx; everything else is in support-* files -->
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="brand.jsx"></script>
<script type="text/babel" src="support-shared.jsx"></script>
<script type="text/babel" src="support-conversations.jsx"></script>
<script type="text/babel" src="support-other.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <DCSection id="entry" title="Agent entry"
        subtitle="Internal portal · agent role validated · non-agents signed out">
        <DCArtboard id="s-login"   label="A · Sign in"       width={1456} height={916}>
          <SupportLogin/>
        </DCArtboard>
      </DCSection>

      <DCSection id="workspace" title="Live workspace"
        subtitle="Three tabs · realtime via Postgres Changes · dark-only">
        <DCArtboard id="s-conv"      label="B · Conversations"  width={1456} height={916}>
          <SupportConversations/>
        </DCArtboard>
        <DCArtboard id="s-approvals" label="C · Approvals"      width={1456} height={916}>
          <SupportApprovals/>
        </DCArtboard>
        <DCArtboard id="s-tickets"   label="D · Tickets"        width={1456} height={916}>
          <SupportTickets/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

function mount() {
  if (!window.SupportConversations || !window.SupportLogin
      || !window.SupportApprovals || !window.SupportTickets
      || !window.DesignCanvas || !window.MapBG) {
    return setTimeout(mount, 50);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
}
mount();
</script>
</body>
</html>
